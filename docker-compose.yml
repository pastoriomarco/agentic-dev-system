services:
  webhook:
    image: agentic-dev-system:latest
    build: .
    container_name: agent-webhook
    user: "0:0"
    depends_on:
      - redis
      - egress-proxy
    env_file:
      - .env
    environment:
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - DEPLOYMENT_ENV=${DEPLOYMENT_ENV:-development}
      - WEBHOOK_DELIVERY_TTL_SECONDS=${WEBHOOK_DELIVERY_TTL_SECONDS:-86400}
      - WEBHOOK_MAX_BODY_BYTES=${WEBHOOK_MAX_BODY_BYTES:-262144}
      - WEBHOOK_RATE_LIMIT_WINDOW_SECONDS=${WEBHOOK_RATE_LIMIT_WINDOW_SECONDS:-60}
      - WEBHOOK_RATE_LIMIT_GLOBAL_MAX=${WEBHOOK_RATE_LIMIT_GLOBAL_MAX:-120}
      - WEBHOOK_RATE_LIMIT_REPO_MAX=${WEBHOOK_RATE_LIMIT_REPO_MAX:-60}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_BASE_BRANCH=${GITHUB_BASE_BRANCH:-main}
      - ALLOWED_REPOS=${ALLOWED_REPOS:-}
      - ALLOWED_TRIGGER_USERS=${ALLOWED_TRIGGER_USERS:-}
      - ALLOWED_AUTHOR_ASSOCIATIONS=${ALLOWED_AUTHOR_ASSOCIATIONS:-}
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-}
      - GITHUB_STATUS_LABELS_ENABLED=${GITHUB_STATUS_LABELS_ENABLED:-true}
      - GITHUB_STATUS_COMMENTS_ENABLED=${GITHUB_STATUS_COMMENTS_ENABLED:-true}
      - GITHUB_ASSIGN_ON_PROCESSING=${GITHUB_ASSIGN_ON_PROCESSING:-false}
      - GITHUB_ASSIGNEE_LOGIN=${GITHUB_ASSIGNEE_LOGIN:-}
      - GH_LABEL_QUEUED=${GH_LABEL_QUEUED:-agent:queued}
      - GH_LABEL_IN_PROGRESS=${GH_LABEL_IN_PROGRESS:-agent:in-progress}
      - GH_LABEL_NEEDS_HUMAN=${GH_LABEL_NEEDS_HUMAN:-agent:needs-human}
      - GH_LABEL_PR_OPENED=${GH_LABEL_PR_OPENED:-agent:pr-opened}
      - GH_LABEL_FAILED=${GH_LABEL_FAILED:-agent:failed}
      - GH_LABEL_DEAD_LETTER=${GH_LABEL_DEAD_LETTER:-agent:dead-letter}
      - GH_LABEL_REJECTED=${GH_LABEL_REJECTED:-agent:rejected}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - RETRY_BASE_DELAY_SECONDS=${RETRY_BASE_DELAY_SECONDS:-60}
      - RETRY_MAX_DELAY_SECONDS=${RETRY_MAX_DELAY_SECONDS:-1800}
      - RETRY_POLL_INTERVAL_SECONDS=${RETRY_POLL_INTERVAL_SECONDS:-15}
      - AGENT_MAX_CHANGED_FILES=${AGENT_MAX_CHANGED_FILES:-20}
      - AGENT_MAX_DIFF_LINES=${AGENT_MAX_DIFF_LINES:-1500}
      - AGENT_MAX_EDIT_ACTIONS=${AGENT_MAX_EDIT_ACTIONS:-50}
      - AGENT_ALLOWED_PATH_PREFIXES=${AGENT_ALLOWED_PATH_PREFIXES:-}
      - AGENT_FORBIDDEN_PATH_PREFIXES=${AGENT_FORBIDDEN_PATH_PREFIXES:-.git/,.github/workflows/,.env,secrets/}
      - AGENT_QUALITY_COMMANDS=${AGENT_QUALITY_COMMANDS:-}
      - AGENT_QUALITY_TIMEOUT_SECONDS=${AGENT_QUALITY_TIMEOUT_SECONDS:-600}
      - AGENT_ALLOW_NO_QUALITY_GATES=${AGENT_ALLOW_NO_QUALITY_GATES:-false}
      - AGENT_PERMISSIONS_FILE=${AGENT_PERMISSIONS_FILE:-/app/AGENT_PERMISSIONS.md}
      - WORKER_IMAGE=${WORKER_IMAGE:-agentic-dev-system:latest}
      - WORKER_NETWORK=${WORKER_NETWORK:-agent_worker_net}
      - WORKER_TIMEOUT_SECONDS=${WORKER_TIMEOUT_SECONDS:-1800}
      - WORKER_CPU_LIMIT=${WORKER_CPU_LIMIT:-1.0}
      - WORKER_MEMORY_LIMIT=${WORKER_MEMORY_LIMIT:-2g}
      - WORKER_PIDS_LIMIT=${WORKER_PIDS_LIMIT:-256}
      - WORKER_RUN_AS_UID=${WORKER_RUN_AS_UID:-1000}
      - WORKER_RUN_AS_GID=${WORKER_RUN_AS_GID:-1000}
      - WORKER_ENABLE_HOST_GATEWAY=${WORKER_ENABLE_HOST_GATEWAY:-false}
      - WORKER_ARTIFACTS_DIR=${WORKER_ARTIFACTS_DIR:-/worker-artifacts}
      - WORKER_ARTIFACTS_VOLUME=${WORKER_ARTIFACTS_VOLUME:-worker-artifacts}
      - WORKER_VOLUME_PREFIX=${WORKER_VOLUME_PREFIX:-agent-task}
      - WORKER_HTTP_PROXY=${WORKER_HTTP_PROXY:-http://egress-proxy:3128}
      - WORKER_HTTPS_PROXY=${WORKER_HTTPS_PROXY:-http://egress-proxy:3128}
      - WORKER_NO_PROXY=${WORKER_NO_PROXY:-localhost,127.0.0.1,egress-proxy,redis}
      - DEEP_HEALTH_TIMEOUT_SECONDS=${DEEP_HEALTH_TIMEOUT_SECONDS:-8}
      - DEEP_HEALTH_GITHUB_URL=${DEEP_HEALTH_GITHUB_URL:-https://api.github.com/meta}
      - DEEP_HEALTH_CHECK_LLM=${DEEP_HEALTH_CHECK_LLM:-false}
      - LLM_API_URL=${LLM_API_URL:-http://localhost:8080/v1/chat/completions}
      - LLM_MODEL=${LLM_MODEL:-qwen3-coder-next}
      - LLM_HOST_ALLOWLIST=${LLM_HOST_ALLOWLIST:-localhost}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///agent_queue.db}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - worker-artifacts:/worker-artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: agent-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app_net

  egress-proxy:
    image: ubuntu/squid:5.2-22.04_beta
    container_name: agent-egress-proxy
    volumes:
      - ./proxy/squid.conf:/etc/squid/squid.conf:ro
    restart: unless-stopped
    networks:
      - app_net
      - worker_net

volumes:
  redis-data:
  worker-artifacts:

networks:
  app_net:
  worker_net:
    name: agent_worker_net
    internal: true
